name: Build MicroPython + TWAI/CAN for ESP32-S3

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip \
            python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util \
            libusb-1.0-0

      - name: Clone ESP-IDF v5.4.1
        run: |
          cd $HOME
          git clone -j8 -b v5.4.1 --recursive https://github.com/espressif/esp-idf.git esp-idf
          cd esp-idf
          ./install.sh esp32s3

      - name: Clone MicroPython
        run: |
          cd $HOME
          git clone --recursive https://github.com/micropython/micropython.git

      - name: Clone TWAI/CAN module
        run: |
          cd $HOME
          mkdir -p cmodules
          cd cmodules
          git clone https://github.com/straga/micropython-esp32-twai.git

      - name: Patch mod_can.c for MicroPython v1.25+
        run: |
          cd $HOME/cmodules/micropython-esp32-twai/src_can_v2
          sed -i 's/mp_raise_NotImplementedError("\([^"]*\)")/mp_raise_NotImplementedError(MP_ERROR_TEXT("\1"))/g' mod_can.c
          sed -i 's/mp_raise_TypeError("\([^"]*\)")/mp_raise_TypeError(MP_ERROR_TEXT("\1"))/g' mod_can.c
          sed -i 's/mp_raise_ValueError("\([^"]*\)")/mp_raise_ValueError(MP_ERROR_TEXT("\1"))/g' mod_can.c
          sed -i 's/mp_raise_msg(&\([^,]*\), "\([^"]*\)")/mp_raise_msg(\&\1, MP_ERROR_TEXT("\2"))/g' mod_can.c
          sed -i 's/mp_raise_msg_varg(&\([^,]*\), "\([^"]*\)"/mp_raise_msg_varg(\&\1, MP_ERROR_TEXT("\2")/g' mod_can.c
          echo "Patch complete"

      - name: Build mpy-cross
        run: |
          cd $HOME/micropython
          make -C mpy-cross -j$(nproc)

      - name: Build submodules
        run: |
          source $HOME/esp-idf/export.sh
          cd $HOME/micropython/ports/esp32
          rm -f *.lock
          make submodules

      - name: Build MicroPython with TWAI/CAN
        run: |
          source $HOME/esp-idf/export.sh
          cd $HOME/micropython/ports/esp32

          idf.py \
            -D MICROPY_BOARD=ESP32_GENERIC_S3 \
            -D USER_C_MODULES=../../../../cmodules/micropython-esp32-twai/src_can_v2/micropython.cmake \
            -B build_ESP32_GENERIC_S3 \
            build

          echo "============================================"
          echo " BUILD COMPLETE"
          echo "============================================"

      - name: Generate combined firmware.bin
        run: |
          source $HOME/esp-idf/export.sh
          cd $HOME/micropython/ports/esp32

          # Create combined firmware.bin that can be flashed at offset 0x0
          esptool.py --chip esp32s3 merge_bin \
            -o build_ESP32_GENERIC_S3/firmware.bin \
            --flash_mode dio \
            --flash_size 4MB \
            --flash_freq 80m \
            0x0 build_ESP32_GENERIC_S3/bootloader/bootloader.bin \
            0x8000 build_ESP32_GENERIC_S3/partition_table/partition-table.bin \
            0x10000 build_ESP32_GENERIC_S3/micropython.bin

          echo "--- Generated files ---"
          ls -lh build_ESP32_GENERIC_S3/firmware.bin
          ls -lh build_ESP32_GENERIC_S3/micropython.bin
          ls -lh build_ESP32_GENERIC_S3/bootloader/bootloader.bin
          ls -lh build_ESP32_GENERIC_S3/partition_table/partition-table.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: micropython-esp32s3-twai-firmware
          path: |
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/firmware.bin
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/micropython.bin
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/bootloader/bootloader.bin
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/partition_table/partition-table.bin
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/log/
          if-no-files-found: warn
