name: Build MicroPython for ESP32-S3 ZERO (with PSRAM & CAN)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget flex bison gperf python3 python3-pip python3-venv \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Clone ESP-IDF release/v5.1
        run: |
          mkdir -p ~/esp
          cd ~/esp
          git clone -b release/v5.1 --recursive https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32s3

      - name: Clone MicroPython v1.22.1
        run: |
          cd ~/esp
          git clone -b v1.22.1 --recursive https://github.com/micropython/micropython.git

      - name: Create ESP32-S3 ZERO board definition (PSRAM + CAN)
        run: |
          mkdir -p ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO

          printf "BOARDNAME = ESP32_S3_ZERO\nFLASH_SIZE = 4MB\nFLASH_MODE = qio\nFLASH_FREQ = 80m\nSDKCONFIG_OVERRIDES = boards/ESP32_S3_ZERO/sdkconfig.board\n" \
            > ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/mpconfigboard.mk

          printf "set(MICROPY_BOARD ESP32_S3_ZERO)\nset(IDF_TARGET esp32s3)\nset(SDKCONFIG_DEFAULTS sdkconfig.board)\n" \
            > ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/mpconfigboard.cmake

          printf "CONFIG_ESP32S3_CAN_SUPPORTED=y\nCONFIG_SOC_TWAI_SUPPORTED=y\nCONFIG_TWAI_ISR_IN_IRAM=y\nCONFIG_TWAI_SUPPRESS_FEATURE_WARNINGS=y\nCONFIG_ESPTOOLPY_FLASHSIZE_4MB=y\nCONFIG_ESPTOOLPY_FLASHMODE_QIO=y\nCONFIG_ESPTOOLPY_FLASHFREQ_80M=y\nCONFIG_SPIRAM=y\nCONFIG_ESP32S3_SPIRAM_SUPPORT=y\nCONFIG_SPIRAM_MODE_OCT=y\nCONFIG_SPIRAM_TYPE_AUTO=y\nCONFIG_SPIRAM_SIZE=2097152\nCONFIG_SPIRAM_SPEED_80M=y\nCONFIG_SPIRAM_FETCH_INSTRUCTIONS=y\nCONFIG_SPIRAM_RODATA=y\nCONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=y\nCONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL=32768\n" \
            > ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board

          # ✅ WICHTIGER FIX
          cp ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board \
             ~/esp/micropython/ports/esp32/sdkconfig.board

      - name: Build mpy-cross
        run: |
          cd ~/esp/micropython
          make -C mpy-cross

      - name: Build firmware
        id: firmware
        run: |
          . ~/esp/esp-idf/export.sh
          cd ~/esp/micropython/ports/esp32
          make submodules
          make BOARD=ESP32_S3_ZERO

      # ✅ DIESER BLOCK ZEIGT DIR DEN ECHTEN FEHLER
      - name: Dump error logs
        if: failure()
        run: |
          echo "====== STDERR ======"
          cat ~/esp/micropython/ports/esp32/build-ESP32_S3_ZERO/log/idf_py_stderr_output_* || true
          echo "====== STDOUT ======"
          cat ~/esp/micropython/ports/esp32/build-ESP32_S3_ZERO/log/idf_py_stdout_output_* || true

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: micropython-esp32-s3-zero-can
          path: ~/esp/micropython/ports/esp32/build-ESP32_S3_ZERO/firmware.bin
