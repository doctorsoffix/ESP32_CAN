name: Build MicroPython for ESP32-S3 ZERO (with PSRAM & CAN)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git wget flex bison gperf python3 python3-pip python3-venv \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Clone ESP-IDF release/v5.1
        run: |
          mkdir -p ~/esp
          cd ~/esp
          git clone -b release/v5.1 --recursive https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh esp32s3

      - name: Clone MicroPython v1.22.1
        run: |
          cd ~/esp
          git clone -b v1.22.1 --recursive https://github.com/micropython/micropython.git

      - name: Create ESP32-S3 ZERO board definition (PSRAM + CAN)
        run: |
          mkdir -p ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO

          # ------- mpconfigboard.mk -------
          printf "BOARDNAME = ESP32_S3_ZERO\n" \
            > ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/mpconfigboard.mk
          printf "FLASH_SIZE = 4MB\nFLASH_MODE = qio\nFLASH_FREQ = 80m\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/mpconfigboard.mk
          printf "SDKCONFIG_OVERRIDES = boards/ESP32_S3_ZERO/sdkconfig.board\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/mpconfigboard.mk

          # ------- mpconfigboard.cmake -------
          printf "set(MICROPY_BOARD ESP32_S3_ZERO)\n" \
            > ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/mpconfigboard.cmake
          printf "set(IDF_TARGET esp32s3)\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/mpconfigboard.cmake
          printf "set(SDKCONFIG_DEFAULTS sdkconfig.board)\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/mpconfigboard.cmake

          # ------- sdkconfig.board -------
          printf "CONFIG_ESP32S3_CAN_SUPPORTED=y\n" \
            > ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board
          printf "CONFIG_SOC_TWAI_SUPPORTED=y\nCONFIG_TWAI_ISR_IN_IRAM=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board
          printf "CONFIG_TWAI_SUPPRESS_FEATURE_WARNINGS=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board

          printf "CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board
          printf "CONFIG_ESPTOOLPY_FLASHMODE_QIO=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board
          printf "CONFIG_ESPTOOLPY_FLASHFREQ_80M=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board

          # PSRAM (2MB, ESP32-FH4R2)
          printf "CONFIG_SPIRAM=y\nCONFIG_ESP32S3_SPIRAM_SUPPORT=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board
          printf "CONFIG_SPIRAM_MODE_OCT=y\nCONFIG_SPIRAM_TYPE_AUTO=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board
          printf "CONFIG_SPIRAM_SIZE=2097152\nCONFIG_SPIRAM_SPEED_80M=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board
          printf "CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y\nCONFIG_SPIRAM_RODATA=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board
          printf "CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=y\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board
          printf "CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL=32768\n" \
            >> ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board

          # ------- CRITICAL FIX: copy sdkconfig.board to root -------
          cp ~/esp/micropython/ports/esp32/boards/ESP32_S3_ZERO/sdkconfig.board \
             ~/esp/micropython/ports/esp32/sdkconfig.board

      - name: Build mpy-cross
        run: |
          cd ~/esp/micropython
          make -C mpy-cross

      - name: Build firmware
        run: |
          . ~/esp/esp-idf/export.sh
          cd ~/esp/micropython/ports/esp32
          make submodules
          make BOARD=ESP32_S3_ZERO

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: micropython-esp32-s3-zero-can
          path: ~/esp/micropython/ports/esp32/build-ESP32_S3_ZERO/firmware.bin
