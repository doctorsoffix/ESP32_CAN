name: Build MicroPython + TWAI/CAN for ESP32-S3

on:
  workflow_dispatch:  # Manuell starten über GitHub UI
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip \
            python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util \
            libusb-1.0-0

      - name: Clone ESP-IDF v5.4.1
        run: |
          cd $HOME
          git clone -j8 -b v5.4.1 --recursive https://github.com/espressif/esp-idf.git esp-idf
          cd esp-idf
          ./install.sh esp32s3
          echo "ESP-IDF v5.4.1 installed"

      - name: Clone MicroPython
        run: |
          cd $HOME
          git clone --recursive https://github.com/micropython/micropython.git
          echo "MicroPython cloned"

      - name: Clone TWAI/CAN module
        run: |
          cd $HOME
          mkdir -p cmodules
          cd cmodules
          git clone https://github.com/straga/micropython-esp32-twai.git
          echo "TWAI/CAN module cloned"
          echo "--- Directory structure ---"
          ls -la micropython-esp32-twai/src_can_v2/

      - name: Build mpy-cross
        run: |
          cd $HOME/micropython
          make -C mpy-cross -j$(nproc)
          echo "--- mpy-cross built ---"
          ls -lh mpy-cross/build/mpy-cross

      - name: Build submodules
        run: |
          source $HOME/esp-idf/export.sh
          cd $HOME/micropython/ports/esp32
          rm -f *.lock
          make submodules
          echo "--- Submodules ready ---"

      - name: Build MicroPython with TWAI/CAN
        run: |
          source $HOME/esp-idf/export.sh
          cd $HOME/micropython/ports/esp32
          idf.py \
            -D MICROPY_BOARD=ESP32_GENERIC_S3 \
            -D USER_C_MODULES=../../../../cmodules/micropython-esp32-twai/src_can_v2/micropython.cmake \
            -B build_ESP32_GENERIC_S3 \
            build
          echo ""
          echo "============================================"
          echo " BUILD COMPLETE"
          echo "============================================"
          ls -lh build_ESP32_GENERIC_S3/micropython.bin 2>/dev/null || true
          ls -lh build_ESP32_GENERIC_S3/firmware.bin 2>/dev/null || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: micropython-esp32s3-twai-firmware
          path: |
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/firmware.bin
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/micropython.bin
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/bootloader/bootloader.bin
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/partition_table/partition-table.bin
          if-no-files-found: error
